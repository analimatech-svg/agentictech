<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills Registry — MaestroAI-Tech</title>
  <meta name="description" content="43 skills agênticas para Consultores de IA que desenvolvem software com excelência.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --bg:         #f9fafb;
  --surface:    #ffffff;
  --border:     #e5e7eb;
  --border-2:   #d1d5db;
  --text:       #111827;
  --text-2:     #6b7280;
  --text-3:     #9ca3af;
  --primary:    #4361ee;
  --teal:       #2ec4b6;
  --amber:      #d97706;
  --shadow:     0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-lg:  0 4px 16px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.04);
  --r:          8px;
  --font:       'Inter', -apple-system, sans-serif;
}
[data-theme="dark"] {
  --bg:      #0f1117;
  --surface: #1a1d27;
  --border:  rgba(255,255,255,.07);
  --border-2:rgba(255,255,255,.12);
  --text:    #f3f4f6;
  --text-2:  #9ca3af;
  --text-3:  #6b7280;
  --shadow:     0 1px 3px rgba(0,0,0,.3);
  --shadow-lg:  0 4px 16px rgba(0,0,0,.45);
}

/* ── RESET ───────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
a { color:inherit; text-decoration:none; }
button { cursor:pointer; border:none; background:none; font-family:var(--font); color:inherit; }
input  { font-family:var(--font); }

/* ── HEADER ──────────────────────────────────────────────── */
.header {
  position: sticky; top:0; z-index:100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1280px; margin:0 auto;
  padding: 0 32px; height: 58px;
  display: flex; align-items: center; gap: 20px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.logo-mark {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--primary), var(--teal));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; letter-spacing: -.5px;
}
.logo-text {
  font-size: 14px; font-weight: 600; color: var(--text);
  letter-spacing: -.3px;
}
.logo-text em { font-style: normal; color: var(--text-2); font-weight: 400; }

.search-wrap {
  flex: 1; max-width: 520px;
  position: relative;
}
.search-ico {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); pointer-events: none; display: flex;
}
.search-input {
  width: 100%; height: 38px;
  border: 1px solid var(--border-2);
  border-radius: 19px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  padding: 0 36px 0 38px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.search-input::placeholder { color: var(--text-3); }
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67,97,238,.1); }
.clear-btn {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; border-radius: 50%;
  color: var(--text-3); font-size: 12px;
  display: none; align-items: center; justify-content: center;
  transition: background .15s;
}
.clear-btn:hover { background: var(--border); color: var(--text); }
.clear-btn.on { display: flex; }

.hdr-right { display:flex; align-items:center; gap:6px; margin-left:auto; flex-shrink:0; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); font-size: 14px;
  transition: background .15s, color .15s;
}
.icon-btn:hover { background: var(--bg); color: var(--text); }
.gh-link {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 34px; border-radius: 6px;
  font-size: 13px; font-weight: 500; color: var(--text-2);
  border: 1px solid var(--border-2);
  transition: border-color .15s, color .15s;
}
.gh-link:hover { border-color: var(--text); color: var(--text); }

/* ── FILTER STRIP ────────────────────────────────────────── */
.filter-strip {
  position: sticky; top: 58px; z-index: 90;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.filter-inner {
  max-width: 1280px; margin: 0 auto;
  padding: 10px 32px;
  display: flex; align-items: center; gap: 6px;
  overflow-x: auto; scrollbar-width: none;
}
.filter-inner::-webkit-scrollbar { display: none; }

.pill {
  display: inline-flex; align-items: center; gap: 5px;
  height: 32px; padding: 0 14px;
  border-radius: 16px;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border-2);
  color: var(--text-2);
  background: var(--surface);
  white-space: nowrap; flex-shrink: 0;
  transition: all .15s;
}
.pill:hover { border-color: var(--text-2); color: var(--text); }
.pill.active { border-color: var(--primary); color: var(--primary); background: rgba(67,97,238,.06); font-weight: 600; }
.pill .n { font-size: 11px; color: var(--text-3); font-weight: 400; }
.pill.active .n { color: rgba(67,97,238,.7); }

.pill-sep { width: 1px; height: 16px; background: var(--border); flex-shrink:0; margin: 0 2px; }

/* ── MAIN ────────────────────────────────────────────────── */
.main { max-width: 1280px; margin: 0 auto; padding: 28px 32px 80px; }
.result-row { display: flex; align-items: center; margin-bottom: 18px; }
.result-txt { font-size: 13px; color: var(--text-3); }

/* ── GRID ────────────────────────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

/* ── CARD ────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 0;
  cursor: pointer;
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: box-shadow .18s, transform .18s, border-color .18s;
}
.card:hover {
  box-shadow: var(--shadow-lg);
  border-color: var(--border-2);
  transform: translateY(-1px);
}

/* left border accent */
.card-body {
  padding: 16px 16px 14px 18px;
  flex: 1; display: flex; flex-direction: column; gap: 5px;
  border-left: 3px solid transparent;
}
.c-sdlc    .card-body { border-left-color: var(--primary); }
.c-quality .card-body { border-left-color: var(--teal); }
.c-docs    .card-body { border-left-color: var(--amber); }

.card-meta { display: flex; align-items: center; gap: 6px; }
.cat-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .6px;
}
.c-sdlc    .cat-label { color: var(--primary); }
.c-quality .cat-label { color: var(--teal); }
.c-docs    .cat-label { color: var(--amber); }

.meta-dot { width: 2px; height: 2px; border-radius: 50%; background: var(--border-2); }

.phase-label { font-size: 11px; color: var(--text-3); font-weight: 400; }

.card-title {
  font-size: 14px; font-weight: 600; color: var(--text);
  line-height: 1.35; margin-top: 1px;
}
.card-slug {
  font-size: 11px; color: var(--text-3);
  font-feature-settings: "tnum";
  letter-spacing: .1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-desc {
  font-size: 12.5px; color: var(--text-2); line-height: 1.55;
  margin-top: 3px; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-footer {
  padding: 9px 16px 10px 18px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.level-badge {
  font-size: 11px; font-weight: 500; padding: 2px 8px;
  border-radius: 10px;
}
.l-aprendiz   { color: #059669; background: rgba(5,150,105,.09); }
.l-praticante { color: var(--primary); background: rgba(67,97,238,.09); }
.l-regente    { color: var(--amber); background: rgba(217,119,6,.09); }
.l-maestro    { color: #dc2626; background: rgba(220,38,38,.09); }

.card-cta { font-size: 11px; color: var(--text-3); }

/* empty state */
.empty-state {
  grid-column: 1/-1;
  text-align: center; padding: 80px 24px; color: var(--text-3);
}
.empty-state p { font-size: 14px; margin-bottom: 4px; color: var(--text-2); }
.empty-state small { font-size: 12px; }

/* ── DRAWER ──────────────────────────────────────────────── */
.overlay {
  position: fixed; inset:0;
  background: rgba(0,0,0,.4);
  z-index: 200;
  opacity:0; pointer-events:none;
  transition: opacity .2s;
  display: flex; align-items: flex-start; justify-content: flex-end;
}
.overlay.open { opacity:1; pointer-events:all; }

.drawer {
  height: 100vh;
  width: 540px; max-width: 100vw;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform .22s cubic-bezier(.25,.46,.45,.94);
  scrollbar-width: thin;
}
.overlay.open .drawer { transform: translateX(0); }
.drawer::-webkit-scrollbar { width: 4px; }
.drawer::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

/* drawer accent strip */
.drawer-strip {
  height: 4px;
}
.d-sdlc    .drawer-strip { background: var(--primary); }
.d-quality .drawer-strip { background: var(--teal); }
.d-docs    .drawer-strip { background: var(--amber); }

.drawer-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
.drawer-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.close-btn {
  width: 28px; height: 28px; border-radius: 6px; flex-shrink:0;
  color: var(--text-3); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.close-btn:hover { background: var(--bg); color: var(--text); }
.drawer-title { font-size: 20px; font-weight: 700; line-height: 1.25; letter-spacing: -.3px; }
.drawer-slug  { font-size: 12px; color: var(--text-3); margin-top: 4px; }

.drawer-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.dpill {
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 10px; text-transform: uppercase; letter-spacing: .4px;
}
.dp-sdlc    { color: var(--primary); background: rgba(67,97,238,.08); }
.dp-quality { color: var(--teal);    background: rgba(46,196,182,.08); }
.dp-docs    { color: var(--amber);   background: rgba(217,119,6,.08); }
.dp-aprendiz   { color: #059669; background: rgba(5,150,105,.08); }
.dp-praticante { color: var(--primary); background: rgba(67,97,238,.08); }
.dp-regente    { color: var(--amber);   background: rgba(217,119,6,.08); }
.dp-neutral { color: var(--text-2); background: var(--bg); border: 1px solid var(--border); }

.drawer-body { padding: 20px 24px 32px; display: flex; flex-direction: column; gap: 24px; }
.drawer-desc { font-size: 14px; color: var(--text-2); line-height: 1.7; }

.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text-3); margin-bottom: 10px; }

/* meta grid */
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.meta-cell {
  background: var(--bg); border-radius: 6px; padding: 10px 12px;
  border: 1px solid var(--border);
}
.mc-k { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 3px; }
.mc-v { font-size: 13px; color: var(--text); font-weight: 500; }

/* io rows */
.io-list { display: flex; flex-direction: column; gap: 5px; }
.io-row { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; color: var(--text-2); line-height: 1.5; }
.io-tag {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
  padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink:0; margin-top: 2px;
}
.io-in  { color: var(--primary); background: rgba(67,97,238,.08); }
.io-out { color: var(--teal);    background: rgba(46,196,182,.08); }

/* criteria */
.crit-list { display: flex; flex-direction: column; gap: 6px; }
.crit-row { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; color: var(--text-2); line-height: 1.5; }
.crit-row::before { content: '—'; color: var(--border-2); flex-shrink:0; font-weight: 300; }

/* practice chips */
.prac-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.prac-chip {
  font-size: 12px; font-weight: 500; padding: 4px 10px;
  border-radius: 6px; border: 1px solid var(--border-2);
  color: var(--text-2);
}
.section-divider { height: 1px; background: var(--border); }

.gh-row {
  display: flex;
  padding-top: 4px;
}
.gh-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 16px; border-radius: 6px;
  border: 1px solid var(--border-2);
  font-size: 13px; font-weight: 500; color: var(--text-2);
  transition: all .15s;
}
.gh-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(67,97,238,.04); }

/* ── FOOTER ──────────────────────────────────────────────── */
.footer { border-top: 1px solid var(--border); }
.footer-inner {
  max-width: 1280px; margin: 0 auto;
  padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.footer-l { font-size: 12px; color: var(--text-3); }
.footer-l a { color: var(--text-2); }
.footer-links { display: flex; gap: 16px; }
.footer-link { font-size: 12px; color: var(--text-3); transition: color .15s; }
.footer-link:hover { color: var(--primary); }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 780px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 520px) {
  .grid { grid-template-columns: 1fr; }
  .header-inner, .filter-inner, .main, .footer-inner { padding-left: 16px; padding-right: 16px; }
  .drawer { width: 100vw; }
  .logo-text em { display: none; }
  .gh-link span { display: none; }
}
</style>
</head>

/* ── DATA ────────────────────────────────────────────────── */
const S = [
  {id:'planning',       slug:'skills/sdlc/planning',       title:'Planning',        cat:'sdlc',    phase:'Fase 1',      level:'Aprendiz',

/* ── FILTER STATE ────────────────────────────────────────── */
let cat = 'all', level = '', q = '';

function filtered() {
  return S.filter(s => {
    const mc = cat === 'all' || s.cat === cat;
    const ml = !level || s.level === level;
    const ql = q.toLowerCase();
    const mq = !ql || s.title.toLowerCase().includes(ql)
      || s.slug.toLowerCase().includes(ql)
      || s.desc.toLowerCase().includes(ql)
      || s.phase.toLowerCase().includes(ql)
      || (s.prac||[]).join(' ').toLowerCase().includes(ql);
    return mc && ml && mq;
  });
}

/* ── RENDER GRID ─────────────────────────────────────────── */
const lvlClass = {Aprendiz:'l-aprendiz',Praticante:'l-praticante',Regente:'l-regente',Maestro:'l-maestro'};
const catLabel = {sdlc:'SDLC',quality:'Qualidade',docs:'Docs'};

function render() {
  const vis = filtered();
  document.getElementById('rcount').textContent =
    vis.length === 43 ? '43 skills' : `${vis.length} skill${vis.length !== 1 ? 's' : ''} encontrada${vis.length !== 1 ? 's' : ''}`;

  document.getElementById('grid').innerHTML = vis.length ? vis.map(s => `
    <div class="card c-${s.cat}" onclick="open_('${s.id}')">
      <div class="card-body">
        <div class="card-meta">
          <span class="cat-label">${catLabel[s.cat]}</span>
          <span class="meta-dot"></span>
          <span class="phase-label">${s.phase}</span>
        </div>
        <div class="card-title">${s.title}</div>
        <div class="card-slug">${s.slug}</div>
        <div class="card-desc">${s.desc}</div>
      </div>
      <div class="card-footer">
        <span class="level-badge ${lvlClass[s.level]}">${s.level}</span>
        <span class="card-cta">Ver skill</span>
      </div>
    </div>`).join('')
  : `<div class="empty-state"><p>Nenhuma skill encontrada</p><small>Tente outro termo ou remova os filtros</small></div>`;
}

/* ── FILTERS ─────────────────────────────────────────────── */
document.querySelectorAll('.pill[data-cat]').forEach(b => b.onclick = () => {
  document.querySelectorAll('.pill[data-cat]').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); cat = b.dataset.cat; render();
});
document.querySelectorAll('.pill[data-level]').forEach(b => b.onclick = () => {
  const same = b.classList.contains('active');
  document.querySelectorAll('.pill[data-level]').forEach(x => x.classList.remove('active'));
  level = same ? '' : b.dataset.level;
  if (!same) b.classList.add('active');
  render();
});
document.getElementById('q').oninput = e => {
  q = e.target.value;
  document.getElementById('qclear').classList.toggle('on', !!q);
  render();
};
function clearQ() {
  document.getElementById('q').value = ''; q = '';
  document.getElementById('qclear').classList.remove('on');
  render();
}

/* ── DRAWER ──────────────────────────────────────────────── */
const dpillClass = {sdlc:'dp-sdlc',quality:'dp-quality',docs:'dp-docs',
  Aprendiz:'dp-aprendiz',Praticante:'dp-praticante',Regente:'dp-regente'};

function open_(id) {
  const s = S.find(x => x.id === id);
  if (!s) return;
  const dr = document.getElementById('drawer');
  dr.className = `drawer d-${s.cat}`;
  document.getElementById('d-title').textContent = s.title;
  document.getElementById('d-slug').textContent = s.slug;
  document.getElementById('d-desc').textContent = s.obj;
  document.getElementById('d-pills').innerHTML = `
    <span class="dpill ${dpillClass[s.cat]}">${catLabel[s.cat]}</span>
    <span class="dpill ${dpillClass[s.level]}">${s.level}</span>
    <span class="dpill dp-neutral">${s.phase}</span>`;
  document.getElementById('d-meta').innerHTML = `
    <div class="meta-cell"><div class="mc-k">Categoria</div><div class="mc-v">${catLabel[s.cat]}</div></div>
    <div class="meta-cell"><div class="mc-k">Fase</div><div class="mc-v">${s.phase}</div></div>
    <div class="meta-cell"><div class="mc-k">Nível mínimo</div><div class="mc-v">${s.level}</div></div>
    <div class="meta-cell"><div class="mc-k">Provedores LLM</div><div class="mc-v">Claude · GPT-4o · Gemini</div></div>`;
  document.getElementById('d-io').innerHTML =
    (s.inputs||[]).map(x=>`<div class="io-row"><span class="io-tag io-in">Entrada</span>${x}</div>`).join('')+
    (s.outputs||[]).map(x=>`<div class="io-row"><span class="io-tag io-out">Saída</span>${x}</div>`).join('');
  document.getElementById('d-crit').innerHTML = (s.crit||[]).map(c=>`<div class="crit-row">${c}</div>`).join('');
  document.getElementById('d-prac').innerHTML = (s.prac||[]).map(p=>`<span class="prac-chip">${p}</span>`).join('');
  document.getElementById('d-gh').href = `https://github.com/analimatech-svg/agentictech/blob/main/${s.gh}`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function close_() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function maybeClose(e) { if (e.target === document.getElementById('overlay')) close_(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') close_(); });

/* ── THEME ───────────────────────────────────────────────── */
function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  localStorage.setItem('mt-theme', dark ? 'light' : 'dark');
}
const saved = localStorage.getItem('mt-theme');
if (saved) document.documentElement.setAttribute('data-theme', saved);

render();
</script>
